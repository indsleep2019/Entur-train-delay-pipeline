name: R21 Data Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: '0 5 * * *'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          persist-credentials: true

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run ETL script
        run: python etl/fetch_r21_data.py
        
        - name: Commit generated data
  run: |
    git config --global user.name "github-actions"
    git config --global user.email "actions@github.com"
    git add data/*.csv
    git commit -m "Auto data update" || echo "No changes"
    git pull --rebase
    git push
