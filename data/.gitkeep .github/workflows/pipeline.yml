name: R21 Data Pipeline

on:
  schedule:
    - cron: '0 5 * * *'   # hver dag kl 05:00
  workflow_dispatch:      # lar deg kjøre manuelt

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Run ETL script
        run: python etl/fetch_r21_data.py

      - name: Commit data files
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/*.csv
          git commit -m "Auto data update" || echo "No changes"
          git push
